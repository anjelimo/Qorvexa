name: qorvexa
description: A modern e-commerce marketplace with M-Pesa payment integration.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Backend & Database
  supabase_flutter: ^1.10.0
  supabase: ^1.10.0

  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # UI & Navigation
  go_router: ^12.0.0
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^4.2.0
  shimmer: ^3.0.0
  lottie: ^2.6.0

  # Forms & Validation
  formz: ^0.6.0
  flutter_form_builder: ^9.1.0
  form_builder_validators: ^10.0.0

  # Payment & M-Pesa
  m_pesa_flutter: ^0.2.0
  uni_links: ^0.0.2

  # Push Notifications
  firebase_core: ^2.24.0
  firebase_messaging: ^14.6.0
  flutter_local_notifications: ^17.0.0

  # Image Handling
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0

  # Date & Time
  intl: ^0.19.0
  table_calendar: ^3.0.0

  # Logging & Analytics
  firebase_analytics: ^10.7.0
  logger: ^2.0.0

  # Utilities
  get_it: ^7.6.0
  equatable: ^2.0.0
  json_serializable: ^6.7.0
  dartz: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^2.0.0

  # Code Generation
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
